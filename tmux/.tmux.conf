# ============================================================
#  ~/.tmux.conf   (Tokyo Night themed, vim-tmux-navigator ready)
# ============================================================

# ---- General ----
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # true color
set -g mouse on
set -g base-index 1                # windows start at 1
setw -g pane-base-index 1          # panes start at 1
set -g renumber-windows on
set -sg escape-time 0              # no delay for <Esc> (important for nvim)
set -g focus-events on             # let nvim know about focus (autoread, etc.)
set -g history-limit 50000
setw -g mode-keys vi               # vi keys in copy mode

# Reload config with prefix + r
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# ---- Splits (open in the current path) ----
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ============================================================
#  Seamless nvim <-> tmux pane navigation  (Ctrl + h/j/k/l)
#  Pairs with christoomey/vim-tmux-navigator inside Neovim.
# ============================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
  | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ============================================================
#  Tokyo Night status bar  (no external plugins required)
# ============================================================
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26]  "

# Right: date + time
set -g status-right-length 80
set -g status-right "#[fg=#414868,bg=#1a1b26]#[fg=#c0caf5,bg=#414868]  %a %d %b #[fg=#7aa2f7,bg=#414868]#[fg=#1a1b26,bg=#7aa2f7,bold]  %H:%M "

# Windows
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26]  #I:#W  "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#bb9af7,bold]  #I:#W  "
setw -g window-status-separator ""

# Panes
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Messages
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"

# Copy-mode selection
setw -g mode-style "bg=#283457,fg=#c0caf5"
